name: Rust Release (Portable)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}
        run: npx tauri build --no-bundle

      - name: Extract version
        id: version
        shell: bash
        run: |
          ver=$(grep '^version =' src-tauri/Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          echo "version=$ver" >> $GITHUB_OUTPUT

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release_pkg/voxelproxy
          cp src-tauri/target/release/voxelproxy.exe release_pkg/voxelproxy/
          cp src-tauri/windivert/WinDivert.dll release_pkg/voxelproxy/
          cp src-tauri/windivert/WinDivert64.sys release_pkg/voxelproxy/

          cd release_pkg
          7z a ../voxelproxy-${{ steps.version.outputs.version }}.zip voxelproxy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: voxelproxy-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
